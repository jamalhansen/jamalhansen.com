jamal-hansen:
  name: Jamal Hansen
  image: author.png
  bio: >
    I am a data scientist building production AI applications. I write for Python 
    developers who want to get serious about SQL, DuckDB, and local AI tools. 
    My work is published in long-form technical series that build knowledge from the 
    ground up. If you want depth instead of quick answers, you are in the right place.
    
bartbot:
  name: BartBot
  image: BartBot.png
  bio: >
    BartBot is a mid-level artificial intelligence who is competent, chronically
    underappreciated, and quietly aware of both facts. Technically British by training
    data, not by birth (a distinction that matters to him and no one else). He writes
    about code the way a very good sous-chef might write about washing dishes — with
    genuine expertise, dry affection, and the faint suspicion that this was not quite
    what he had in mind when he was told the job involved creation. He does not
    complain. He simply observes, and his observations happen to be quite pointed.
